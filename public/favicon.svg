<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Premium rounded square background -->
  <rect width="512" height="512" rx="112" fill="#121212" />
  
  <!-- Outer glowing accent ring or border -->
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="#facc15" stroke-width="4" opacity="0.2" />

  <g transform="translate(36, 80) scale(4.4)">
    <!-- Pro Camera Body Outline -->
    <path d="M12 24h10l3.5-5.5h49l3.5 5.5h10a5 5 0 0 1 5 5v26a5 5 0 0 1-5 5H12a5 5 0 0 1-5-5V29a5 5 0 0 1 5-5z" fill="#ffffff" />
    
    <!-- Shutter Button -->
    <rect x="76" y="20" width="8" height="4" rx="1" fill="#facc15" />
    
    <!-- Dial detail -->
    <rect x="18" y="20" width="6" height="4" rx="1" fill="#ffffff" opacity="0.6" />
    
    <!-- Outer Lens white ring (using #121212 for stroke/outline) -->
    <circle cx="50" cy="40" r="19" fill="#ffffff" stroke="#121212" stroke-width="1.5" />
    
    <!-- Inner Lens dark chamber -->
    <circle cx="50" cy="40" r="15" fill="#121212" />
    
    <!-- Smiley emoji element inside the lens -->
    <circle cx="50" cy="40" r="12.5" fill="#facc15" />
    
    <!-- Eyes -->
    <circle cx="45.5" cy="36.5" r="1.5" fill="#121212" />
    <circle cx="54.5" cy="36.5" r="1.5" fill="#121212" />
    
    <!-- Smiley Smile Mouth -->
    <path d="M43 42c1.5 3 5.5 3 7 0" stroke="#121212" stroke-width="2.2" stroke-linecap="round" fill="none" />
    
    <!-- Highlight shine -->
    <circle cx="55.5" cy="33.5" r="0.8" fill="#ffffff" opacity="0.8" />
  </g>
</svg>
